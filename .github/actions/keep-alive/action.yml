name: Keep Alive
description: Execute a keep-alive read against a supported datastore.

inputs:
  service:
    description: Datastore to ping. Supported values are turso and upstash.
    required: true
  url:
    description: Datastore connection URL.
    required: true
  token:
    description: Datastore auth token.
    required: true
  index_name:
    description: Upstash Search index name.
    required: false
    default: default

runs:
  using: composite
  steps:
    - name: Execute keep-alive request
      working-directory: ${{ github.action_path }}
      run: |
        case "${{ inputs.service }}" in
          turso)
            python3 src/turso.py
            ;;
          upstash)
            python3 src/upstash.py
            ;;
          *)
            echo "Unsupported keep-alive service: ${{ inputs.service }}" >&2
            exit 1
            ;;
        esac
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_INDEX_NAME: ${{ inputs.index_name }}
