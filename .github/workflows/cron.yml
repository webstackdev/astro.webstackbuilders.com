name: Cron

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping-production:
    name: Ping Turso Production DB
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Execute keep-alive query
        uses: "./.github/actions/keep-alive"
        with:
          service: turso
          url: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          token: ${{ secrets.ASTRO_DB_APP_TOKEN }}

  ping-preview:
    name: Ping Turso Preview DB
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Execute keep-alive query
        uses: "./.github/actions/keep-alive"
        with:
          service: turso
          url: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          token: ${{ secrets.ASTRO_DB_APP_TOKEN }}

  ping-upstash-search:
    name: Ping Upstash Search
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Execute keep-alive read
        uses: "./.github/actions/keep-alive"
        with:
          service: upstash
          url: ${{ vars.PUBLIC_UPSTASH_SEARCH_REST_URL }}
          token: ${{ vars.PUBLIC_UPSTASH_SEARCH_READONLY_TOKEN }}
          index_name: default
