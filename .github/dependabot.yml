version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    versioning-strategy: 'increase'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 1
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    labels:
      - 'type: dependencies 🔗'
      - 'automerge 🤞'
    groups:
      npm-dependencies:
        patterns:
          - '*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 1
    groups:
      github-actions:
        patterns:
          - '*'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 1
    labels:
      - 'type: dependencies 🔗'
      - 'automerge 🤞'
    groups:
      python-dependencies:
        patterns:
          - '*'
